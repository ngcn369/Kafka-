<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGCN | Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #000000;
            --card-border: #f0f0f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--secondary);
            margin: 0; padding: 0;
        }

        header {
            background: var(--secondary);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 3.5rem; margin: 0; font-weight: 800; letter-spacing: -3px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .search-wrapper {
            margin-top: -30px; text-align: center; margin-bottom: 50px;
        }
        #searchInput {
            padding: 18px 30px; width: 90%; max-width: 500px;
            border-radius: 50px; border: 3px solid var(--secondary);
            font-size: 1.1rem; font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .category-label {
            font-size: 1.2rem; font-weight: 800; text-transform: uppercase;
            border-bottom: 5px solid var(--secondary);
            display: inline-block; margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .media-content {
            width: 100%; height: 220px; object-fit: cover; display: block;
        }

        .card-content { padding: 20px; }
        .card-content h3 { margin: 0 0 5px; font-size: 1.2rem; }
        .card-content p { margin: 0; color: #777; font-size: 0.9rem; }

        /* Lightbox (Pop-up) Styles */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center;
        }

        .lightbox-content { max-width: 90%; max-height: 80vh; border-radius: 10px; }

        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>DIRECTORY.</h1>
</header>

<div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search visuals...">
</div>

<div class="container">
    <div class="category-label">Atmosphere</div>
    
    <div class="grid">
        <div class="card">
            <video class="media-content" controls>
                <source src="suburban-drift.mp4" type="video/mp4">
            </video>
            <div class="card-content">
                <h3>Suburban Drift</h3>
                <p>Tap play to hear audio.</p>
            </div>
        </div>

        <div class="card">
            <img src="night-alley.jpg" class="media-content popup-trigger">
            <div class="card-content">
                <h3>Night Alley</h3>
                <p>Street photography.</p>
            </div>
        </div>

        <div class="card">
            <img src="pink-sky.jpg" class="media-content popup-trigger">
            <div class="card-content">
                <h3>Pink Sky</h3>
                <p>Dusk gradient study.</p>
            </div>
        </div>

        <div class="card">
            <img src="sunset-dog.jpg" class="media-content popup-trigger">
            <div class="card-content">
                <h3>Golden Hour</h3>
                <p>Atmospheric landscape.</p>
            </div>
        </div>

        <div class="card">
            <img src="street-lamp.jpg" class="media-content popup-trigger">
            <div class="card-content">
                <h3>Street Lamp</h3>
                <p>Solitary lighting study.</p>
            </div>
        </div>
    </div>
</div>

<div id="imageLightbox" class="lightbox">
    <img class="lightbox-content" id="expandedImg">
</div>

<script>
    // 1. Search Logic
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const text = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = text.includes(val) ? 'block' : 'none';
        });
    });

    // 2. Pop-up (Lightbox) Logic
    const lightbox = document.getElementById('imageLightbox');
    const expandedImg = document.getElementById('expandedImg');

    document.querySelectorAll('.popup-trigger').forEach(img => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'flex';
            expandedImg.src = img.src;
        });
    });

    // Close Lightbox on click
    lightbox.addEventListener('click', () => {
        lightbox.style.display = 'none';
    });
</script>

</body>
</html>
