<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NGCN | Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #000000;
            --card-border: #f0f0f0;
        }

        /* Prevent side-to-side shaking */
        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0; padding: 0;
            background-color: var(--primary);
            font-family: 'Inter', sans-serif;
        }

        header {
            background: var(--secondary);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 { font-size: 3.5rem; margin: 0; font-weight: 800; letter-spacing: -3px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .search-wrapper { margin-top: -30px; text-align: center; margin-bottom: 50px; }
        
        #searchInput {
            padding: 18px 30px; width: 85%; max-width: 500px;
            border-radius: 50px; border: 3px solid var(--secondary);
            font-size: 1.1rem; font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
        }

        .media-content { width: 100%; height: 250px; object-fit: cover; display: block; }

        .card-content { padding: 20px; }
        .card-content h3 { margin: 0; font-size: 1.2rem; }

        /* Lightbox - Locked & Stable */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.98);
            justify-content: center; align-items: center;
            touch-action: none; /* Prevents scrolling while open */
        }

        .lightbox-content {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        /* Stop body scroll when lightbox is open */
        body.no-scroll { overflow: hidden; position: fixed; width: 100%; }

        @media (max-width: 600px) { header h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>

<header><h1>DIRECTORY.</h1></header>

<div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search visuals...">
</div>

<div class="container">
    <div class="grid">
        <div class="card">
            <video class="media-content" controls preload="metadata">
                <source src="suburban-drift.mp4" type="video/mp4">
            </video>
            <div class="card-content"><h3>Suburban Drift</h3></div>
        </div>

        <div class="card"><img src="night-alley.jpg" class="media-content popup-trigger"><div class="card-content"><h3>Night Alley</h3></div></div>
        <div class="card"><img src="pink-sky.jpg" class="media-content popup-trigger"><div class="card-content"><h3>Pink Sky</h3></div></div>
        <div class="card"><img src="sunset-dog.jpg" class="media-content popup-trigger"><div class="card-content"><h3>Golden Hour</h3></div></div>
        <div class="card"><img src="street-lamp.jpg" class="media-content popup-trigger"><div class="card-content"><h3>Street Lamp</h3></div></div>
    </div>
</div>

<div id="imageLightbox" class="lightbox">
    <img class="lightbox-content" id="expandedImg">
</div>

<script>
    const lightbox = document.getElementById('imageLightbox');
    const expandedImg = document.getElementById('expandedImg');

    // Function to OPEN Lightbox
    function openLightbox(src) {
        expandedImg.src = src;
        lightbox.style.display = 'flex';
        document.body.classList.add('no-scroll');
        
        // This trick adds a "fake" page to browser history
        history.pushState({ lightbox: true }, "");
    }

    // Function to CLOSE Lightbox
    function closeLightbox() {
        lightbox.style.display = 'none';
        document.body.classList.remove('no-scroll');
    }

    // Listen for Back Button
    window.onpopstate = function(event) {
        // If back is pressed and lightbox is open, just close it
        closeLightbox();
    };

    document.querySelectorAll('.popup-trigger').forEach(img => {
        img.addEventListener('click', () => openLightbox(img.src));
    });

    lightbox.addEventListener('click', () => {
        // Close manually and remove the "fake" page from history
        closeLightbox();
        if (history.state && history.state.lightbox) {
            history.back();
        }
    });

    // Simple Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const text = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = text.includes(val) ? 'block' : 'none';
        });
    });
</script>

</body>
</html>
