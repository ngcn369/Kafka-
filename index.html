<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Metamorphosis | Digital Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #1a1a1a;
            --accent-color: #4a4a4a;
            --card-bg: rgba(255, 255, 255, 0.8);
            --glass-nav: rgba(255, 255, 255, 0.7);
        }

        .dark-mode {
            --bg-color: #0f0f0f;
            --text-color: #f0f0f0;
            --accent-color: #a0a0a0;
            --card-bg: rgba(30, 30, 30, 0.8);
            --glass-nav: rgba(15, 15, 15, 0.7);
        }

        * { transition: all 0.3s ease; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            background: var(--glass-nav);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between;
            align-items: center; padding: 0.5rem 2rem;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -1px; }

        #navLinks { list-style: none; display: flex; gap: 20px; }
        #navLinks a { text-decoration: none; color: var(--text-color); font-weight: 600; font-size: 0.9rem; }

        main { max-width: 1000px; margin: 100px auto 50px; padding: 0 20px; }

        .hero { text-align: center; margin-bottom: 60px; animation: fadeIn 1s forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .gallery-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .gallery-img:hover { transform: scale(1.02); }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }

        .lightbox-content { max-width: 90%; max-height: 85vh; border-radius: 8px; }

        #darkModeToggle {
            background: none; border: 1px solid var(--text-color);
            color: var(--text-color); border-radius: 20px;
            padding: 4px 12px; cursor: pointer; font-size: 0.8rem;
        }

        .hamburger { display: none; font-size: 1.5rem; background: none; border: none; color: var(--text-color); cursor: pointer; }

        @media (max-width: 600px) {
            .hamburger { display: block; }
            #navLinks {
                display: none; flex-direction: column; position: absolute;
                top: 60px; left: 0; width: 100%; background: var(--glass-nav);
                padding: 20px; backdrop-filter: blur(20px);
            }
            #navLinks.active { display: flex; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NGCN <span style="font-weight:300">STUDIOS</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="darkModeToggle">MODE</button>
            <button class="hamburger" id="hamburgerMenu">☰</button>
        </div>
        <ul id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <h1>Visualizing Kafka</h1>
            <p style="color: var(--accent-color); font-style: italic;">Atmospheric studies and narrative concepts.</p>
        </section>

        <h2 style="margin-bottom: 20px;">Atmosphere</h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                <video class="gallery-img" autoplay muted loop playsinline>
                    <source src="suburban-drift.mp4" type="video/mp4">
                </video>
            </div>
            <div class="gallery-item"><img src="night-alley.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="sunset-dog.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="pink-sky.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="street-lamp.jpg" class="gallery-img"></div>
        </div>

        <h2 style="margin-top: 60px; margin-bottom: 20px;">The Metamorphosis</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="scene1.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene2.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene3.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene4.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene5.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene6.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene7.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene8.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene9.jpg" class="gallery-img"></div>
            <div class="gallery-item"><img src="scene10.jpg" class="gallery-img"></div>
        </div>
    </main>

    <div id="imageLightbox" class="lightbox">
        <img class="lightbox-content" id="expandedImg">
    </div>

    <script>
        const darkModeBtn = document.getElementById('darkModeToggle');
        darkModeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            darkModeBtn.textContent = document.body.classList.contains('dark-mode') ? 'LIGHT' : 'DARK';
        });

        document.getElementById('hamburgerMenu').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        const lightbox = document.getElementById('imageLightbox');
        const expandedImg = document.getElementById('expandedImg');
        
        // Lightbox for images only
        document.querySelectorAll('img.gallery-img').forEach(img => {
            img.addEventListener('click', () => {
                lightbox.style.display = 'flex';
                expandedImg.src = img.src;
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.style.display = 'none';
        });
    </script>
</body>
</html>
